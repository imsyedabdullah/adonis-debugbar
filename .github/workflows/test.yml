name: Test
on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - run: npm run test:unit

  integration:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        engine: [pg17, pg13, mysql84, mysql57]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - name: Start DB
        run: docker compose -f docker-compose.test.yml up -d --wait ${{ matrix.engine }}
      - run: npm run test:database
        env:
          TEST_ENGINE: ${{ matrix.engine }}
